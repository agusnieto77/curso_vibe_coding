name: Publicar sitio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # R es necesario para que el motor knitr convierta los .qmd a HTML,
      # aunque NO se ejecute el código. Solo knitr + rmarkdown, nada pesado.
      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar paquetes de R
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Necesario para que Quarto pueda procesar los notebooks .ipynb
      - name: Instalar Jupyter
        run: python -m pip install jupyter nbformat

      # No se ejecuta el código (execute.enabled: false en _quarto.yml):
      # solo se convierte prosa + prompts + código a HTML. No hace falta R.
      - name: Renderizar el sitio
        run: quarto render

      - name: Subir artefacto del sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
